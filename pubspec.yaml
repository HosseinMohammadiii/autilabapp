name: autilab_project
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.5.4


dependencies:
  flutter:
    sdk: flutter
  dio: ^5.8.0+1
  get_it: ^8.0.3
  shimmer: ^3.0.0
  go_router: ^14.7.2
  flutter_bloc: ^9.0.0
  flutter_svg: ^2.0.17
  pin_code_fields: ^8.0.1
  connectivity_plus: ^6.1.2
  cached_network_image: ^3.4.1
  smooth_page_indicator: ^1.2.0+3
  

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  change_app_package_name: ^1.4.0

 
  flutter_lints: ^4.0.0


flutter:


  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/audios/

 


  fonts:
    - family: Fredoka-Medium
      fonts:
        - asset: assets/fonts/Fredoka-Medium.ttf
        
    - family: Fredoka-Regular
      fonts:
        - asset: assets/fonts/Fredoka-Regular.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700

