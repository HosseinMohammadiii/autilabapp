  connectivity_plus: ^6.1.2
  cached_network_image: ^3.4.1


  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  change_app_package_name: ^1.4.0

 
  flutter_lints: ^4.0.0


flutter:


